<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUXORA | Luxury Fashion Store</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
background:#0d0d0d;
color:white;
}

header{
background:#000;
padding:20px;
text-align:center;
border-bottom:2px solid gold;
}

.logo{
font-size:45px;
font-weight:bold;
color:gold;
letter-spacing:3px;
}

.tagline{
color:#ccc;
margin-top:10px;
}

.hero{
height:450px;
background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
url('https://images.unsplash.com/photo-1523398002811-999ca8dec234?q=80&w=1200');
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.hero-content h1{
font-size:55px;
color:gold;
}

.hero-content p{
margin-top:15px;
font-size:20px;
}

.btn{
display:inline-block;
margin-top:20px;
padding:12px 25px;
background:gold;
color:black;
text-decoration:none;
border-radius:30px;
font-weight:bold;
}

.section-title{
text-align:center;
margin:40px 0;
font-size:35px;
color:gold;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#1b1b1b;
border:1px solid #333;
border-radius:15px;
overflow:hidden;
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:300px;
object-fit:cover;
}

.card-body{
padding:15px;
text-align:center;
}

.price{
color:gold;
font-size:22px;
margin:10px 0;
}

.order-btn{
display:inline-block;
background:green;
color:white;
padding:10px 20px;
text-decoration:none;
border-radius:25px;
}

.contact{
padding:40px;
text-align:center;
background:#000;
margin-top:40px;
}

footer{
padding:20px;
text-align:center;
background:#050505;
color:#999;
}
</style>

</head>
<body>

<header>
<div class="logo">LUXORA</div>
<div class="tagline">Luxury Fashion Store</div>
</header>

<section class="hero">
<div class="hero-content">
<h1>LUXORA</h1>
<p>أحدث صيحات الموضة الرجالي والحريمي</p>
<a href="#products" class="btn">تسوق الآن</a>
</div>
</section>

<h2 class="section-title" id="products">المنتجات</h2>

<section class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?q=80&w=800">
<div class="card-body">
<h3>تيشيرت رجالي</h3>
<div class="price">350 جنيه</div>

<a class="order-btn"
href="https://wa.me/201032407286?text=أرغب%20في%20طلب%20تيشيرت%20رجالي">
اطلب الآن
</a>

</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1483985988355-763728e1935b?q=80&w=800">
<div class="card-body">
<h3>طقم حريمي</h3>
<div class="price">550 جنيه</div>

<a class="order-btn"
href="https://wa.me/201032407286?text=أرغب%20في%20طلب%20طقم%20حريمي">
اطلب الآن
</a>

</div>
</div>

<section class="products" id="productsContainer">
</section>

<footer>
© 2026 LUXORA - All Rights Reserved
</footer>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyANqRkwjMR8ukWtkc7Fci8hSLtWTPTIn7A",
authDomain: "luxora-store-4fdc5.firebaseapp.com",
projectId: "luxora-store-4fdc5",
storageBucket: "luxora-store-4fdc5.firebasestorage.app",
messagingSenderId: "632646390272",
appId: "1:632646390272:web:51afe9fdc2ea47030a7ee5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadProducts(){
const snapshot = await getDocs(collection(db,"products"));
const container = document.getElementById("productsContainer");

if(!container) return;

container.innerHTML = "";

snapshot.forEach((doc)=>{
const product = doc.data();

container.innerHTML += `
<div class="card">
<img src="${product.image}">
<div class="card-body">
<h3>${product.name}</h3>
<div class="price">${product.price} جنيه</div>

<a class="order-btn"
href="https://wa.me/201032407286?text=أرغب في طلب ${product.name}">
اطلب الآن
</a>

</div>
</div>
`;
});
}

loadProducts();
</script>
</body>
</html>
