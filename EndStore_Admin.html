
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>End Store Admin</title>
<style>
body{font-family:Arial;background:#111;color:#fff;margin:0;padding:20px}
h1{color:gold}
input{display:block;width:100%;max-width:500px;padding:10px;margin:8px 0}
button{padding:10px 15px}
.card{border:1px solid gold;padding:10px;margin:10px 0}
img{max-width:120px}
</style>
</head>
<body>
<h1>AN - End Store</h1>

<h2>إضافة منتج</h2>
<input id="name" placeholder="اسم المنتج">
<input id="price" placeholder="السعر">
<input id="image" placeholder="رابط الصورة">
<button onclick="addProduct()">إضافة</button>

<h2>المنتجات</h2>
<div id="products"></div>

<script>
let products = JSON.parse(localStorage.getItem('products') || '[]');

function save(){
 localStorage.setItem('products', JSON.stringify(products));
 render();
}

function addProduct(){
 products.push({
   name: document.getElementById('name').value,
   price: document.getElementById('price').value,
   image: document.getElementById('image').value
 });
 save();
}

function removeProduct(i){
 products.splice(i,1);
 save();
}

function render(){
 let html='';
 products.forEach((p,i)=>{
  html += `<div class="card">
   ${p.image ? `<img src="${p.image}">` : ''}
   <h3>${p.name}</h3>
   <p>${p.price} جنيه</p>
   <a href="https://wa.me/201032407286?text=أرغب%20في%20طلب%20${encodeURIComponent(p.name)}">اطلب الآن</a>
   <br><br>
   <button onclick="removeProduct(${i})">حذف</button>
  </div>`;
 });
 document.getElementById('products').innerHTML = html;
}

render();
</script>
</body>
</html>
