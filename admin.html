<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة إدارة Luxora</title>
<style>
body{font-family:Arial;background:#111;color:#fff;padding:20px}
input{display:block;width:100%;margin:10px 0;padding:10px}
button{padding:10px 20px;background:gold;border:none}
</style>
</head>
<body>

<h1>لوحة إدارة LUXORA</h1>

<input id="name" placeholder="اسم المنتج">
<input id="price" placeholder="السعر">
<input id="image" placeholder="رابط الصورة">

<button onclick="addProduct()">إضافة</button>

<script>
function addProduct(){
let products = JSON.parse(localStorage.getItem('products')||'[]');

products.push({
name:document.getElementById('name').value,
price:document.getElementById('price').value,
image:document.getElementById('image').value
});

localStorage.setItem('products',JSON.stringify(products));
alert('تمت الإضافة');
}
</script>

</body>
</html>
